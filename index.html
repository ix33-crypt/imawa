<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM - NEXT STAGE</title>
    <style>
        /* 背景白、文字黒、極太ゴシック */
        body {
            background-color: #ffffff;
            color: #000000;
            /* iPhone/Mac/Windowsすべてで極太角ゴシックを優先 */
            font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", "sans-serif";
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            letter-spacing: -0.02em; /* 文字間を詰め気味にして圧力を出す */
        }

        #container {
            width: 85%;
            max-width: 500px;
            text-align: center;
        }

        /* 難易度（画像のように少し小さめ） */
        .difficulty {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        /* メインタイトル（極太） */
        h1 {
            font-size: 3.5rem; /* かなり大きく */
            font-weight: 900;
            margin: 0 0 40px 0;
            line-height: 1;
        }

        /* ルール説明（余白を広く） */
        .rule-box {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 2.2; /* 行間を広く取ってアリス風に */
            margin-bottom: 60px;
            min-height: 150px;
        }

        /* 操作ボタン */
        .btn {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 20px 0;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            background-color: #444;
        }

        /* 非表示用クラス */
        .hidden { display: none; }

        /* ゲーム開始後の赤い演出用 */
        .emergency { color: #ff0000; }
    </style>
</head>
<body>

    <div id="container">
        <div id="screen-rule">
            <div class="difficulty" id="display-diff">難易度: --</div>
            <h1 id="display-title">SYSTEM</h1>
            <div class="rule-box" id="display-rule">
                QRコードをスキャンして<br>データを読み込んでください。
            </div>
            <button class="btn" onclick="goToNext()">NEXT</button>
        </div>

        <div id="screen-game" class="hidden">
            <h1 class="emergency blink">GAME<br>START</h1>
            <div class="rule-box">
                制限時間内にクリアせよ。<br>
                脱落者は即座に排除される。
            </div>
            <button class="btn" onclick="location.reload()">BACK TO TOP</button>
        </div>
    </div>

    <audio id="gameVoice" src=""></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const g = params.get('g');
        const audio = document.getElementById('gameVoice');

        const gameData = {
            'spade': { t: 'おにごっこ', d: '♠ 5', r: 'ハンターから逃げ切れ。<br>制限時間は20分。<br>タッチは「死」を意味する。', s: 'assets/spade.mp3' },
            'dia':   { t: '数字当て', d: '♦ 7', r: '4つの数字から正解を選べ。<br>誤答は即座に<br>電流が流れる。', s: 'assets/dia.mp3' },
            'clover': { t: '伝言ゲーム', d: '♣ 4', r: '声を出さずに<br>最後まで繋げ。<br>沈黙が勝利の鍵だ。', s: 'assets/clover.mp3' },
            'heart': { t: '狼と羊', d: '♥ 9', r: '一人だけが狼になれる。<br>残りの羊は<br>全員死亡する。', s: 'assets/heart.mp3' }
        };

        // 初期表示設定
        if(gameData[g]) {
            document.getElementById('display-title').innerText = gameData[g].t;
            document.getElementById('display-diff').innerText = '難易度: ' + gameData[g].d;
            document.getElementById('display-rule').innerHTML = gameData[g].r;
            audio.src = gameData[g].s;
        }

        // 次の画面へ行く処理
        function goToNext() {
            // 音声を再生
            if(audio.src) audio.play();

            // 画面を切り替える（DOM操作）
            document.getElementById('screen-rule').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
        }
    </script>
</body>
</html>

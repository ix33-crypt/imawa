<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA SYSTEM - 待機中</title>
    <style>
        /* 無機質でサイバーなデザインのCSS */
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden; /* スクロールバーを隠す */
        }
        #terminal {
            width: 90%;
            max-width: 600px;
            border: 1px solid #ff0000;
            padding: 20px;
            box-shadow: 0 0 15px #ff0000;
            background: rgba(10, 0, 0, 0.5); /* ほんのり背景を暗く */
        }
        h1 {
            font-size: 2rem;
            margin: 10px 0 20px 0;
            letter-spacing: 5px;
        }
        .difficulty {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .instruction {
            background-color: rgba(255, 0, 0, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .btn {
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn:active {
            background: #ff0000;
            color: #000;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="terminal">
        <p>> SYSTEM CHECK... OK</p>
        <p>> LOCATION: SHINKIBA</p>
        <p class="blink">> WAITING FOR GAME DATA...</p>
        <hr style="border: 0.5px solid #ff0000;">
        <h1>SYSTEM WAITING</h1>
        <div class="difficulty">難易度: --</div>
        <div class="instruction">
            有効なURLパラメータを入力してください。
            (?g=spade / dia / clover / heart)
        </div>
        <button class="btn" onclick="playAudio()">NO DATA</button>
    </div>

    <audio id="gameVoice" src="voice1.mp3"></audio>

    <script>
        function playAudio() {
            document.getElementById('gameVoice').play();
        }
        // URLパラメータで表示を切り替えるスクリプト
        const params = new URLSearchParams(window.location.search);
        const game = params.get('g');
        if(game === 'spade') {
            document.querySelector('h1').innerText = '♠ おにごっこ';
            document.querySelector('.difficulty').innerText = '難易度: ♠ 5';
            document.querySelector('.instruction').innerText = 'ハンターから逃げ切れ。';
            document.querySelector('.btn').innerText = 'PLAY VOICE';
        }
        // 他のゲームも同様に追加可能
    </script>
</body>
</html>

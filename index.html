<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA SYSTEM</title>
    <style>
        /* 背景白、文字黒の設定 */
        body {
            background-color: #ffffff;
            color: #000000;
            /* メイリオを最優先にし、モダンなゴシック体を指定 */
            font-family: "Meiryo", "Hiragino Kaku Gothic ProN", "MS PGothic", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* 全体的に文字間隔を少し広げて無機質感を出す */
            letter-spacing: 0.05em;
        }

        #terminal {
            width: 80%;
            max-width: 500px;
            /* 境界線はあえて細く、または無しで「画面感」を出す */
            border-top: 4px solid #000;
            padding: 40px 20px;
            text-align: center;
        }

        .status {
            font-size: 0.7rem;
            margin-bottom: 30px;
            font-weight: bold;
            text-align: left;
        }

        h1 {
            font-size: 2.2rem;
            margin: 20px 0;
            font-weight: 900; /* 極太 */
        }

        .difficulty {
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .rule-text {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 音声再生ボタンも無機質なデザインに */
        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 0.2em;
        }

        .btn:active {
            background: #666;
        }

        /* 画面がチカチカするノイズ風エフェクト（隠し味） */
        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.02) 50%, rgba(0,0,0,0) 100%);
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div id="terminal">
        <div class="status">> SYSTEM_STABLE / FIELD: SHINKIBA</div>
        
        <div id="content">
            <h1 id="game-title">げぇむを開始
